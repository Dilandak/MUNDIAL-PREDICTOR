<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 — Predictor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg: #090d18;
            --surface: #0f1623;
            --card: #141e2e;
            --border: #1c2a40;
            --green: #00e676;
            --yellow: #ffd600;
            --red: #ff4545;
            --blue: #4f9cff;
            --text: #e8edf5;
            --muted: #55657f;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #0f1623 0%, #0a1428 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .logo-ball {
            font-size: 26px;
            animation: spin 8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .logo-text {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.5px
        }

        .logo-sub {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 1px
        }

        #status-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 5px 14px;
            border-radius: 20px;
            background: #0a2018;
            color: var(--green);
            border: 1px solid #1a4a2a;
            letter-spacing: .3px
        }

        /* NAV */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            gap: 2px;
            overflow-x: auto;
            scrollbar-width: none
        }

        nav::-webkit-scrollbar {
            display: none
        }

        nav button {
            background: none;
            border: none;
            color: var(--muted);
            padding: 13px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all .2s;
            font-family: var(--font);
            letter-spacing: .3px
        }

        nav button:hover {
            color: var(--text)
        }

        nav button.active {
            color: var(--green);
            border-bottom-color: var(--green)
        }

        /* MAIN */
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 16px
        }

        .section {
            display: none
        }

        .section.visible {
            display: block
        }

        /* HOY SECTION */
        .hoy-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px
        }

        .hoy-title {
            font-size: 20px;
            font-weight: 800
        }

        .hoy-date {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
            padding: 4px 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px
        }

        .today-empty {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: var(--muted);
            font-size: 14px
        }

        /* MATCH HOY CARD */
        .hoy-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: border-color .2s
        }

        .hoy-card:hover {
            border-color: #2a3f60
        }

        .hoy-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px
        }

        .hoy-meta {
            font-size: 10px;
            font-weight: 700;
            color: var(--blue);
            letter-spacing: 1.5px;
            text-transform: uppercase
        }

        .hoy-hora {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            background: var(--bg);
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid var(--border)
        }

        .hoy-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px
        }

        .hoy-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center
        }

        .hoy-flag {
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, .4))
        }

        .hoy-team-name {
            font-size: 14px;
            font-weight: 700
        }

        .hoy-team-rank {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600
        }

        .hoy-vs {
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            background: var(--bg);
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            text-align: center
        }

        .hoy-vs-label {
            font-size: 8px;
            color: var(--muted);
            margin-bottom: 2px;
            letter-spacing: 1px
        }

        .hoy-actions {
            display: flex;
            gap: 8px
        }

        .btn-pred {
            flex: 1;
            background: var(--green);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s;
            letter-spacing: .3px
        }

        .btn-pred:hover {
            opacity: .85;
            transform: translateY(-1px)
        }

        .btn-all {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s
        }

        .btn-all:hover {
            border-color: var(--green);
            color: var(--green)
        }

        /* PRED MODAL / INLINE */
        .pred-inline {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-top: 12px;
            display: none
        }

        .pred-inline.open {
            display: block
        }

        .pred-close {
            float: right;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1
        }

        .pred-close:hover {
            color: var(--text)
        }

        /* PROB BARS */
        .prob-section {
            margin: 14px 0
        }

        .prob-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px
        }

        .prob-label {
            width: 110px;
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .prob-bar-wrap {
            flex: 1;
            background: var(--card);
            border-radius: 4px;
            height: 10px;
            overflow: hidden;
            border: 1px solid var(--border)
        }

        .prob-bar {
            height: 100%;
            border-radius: 4px;
            transition: width .8s cubic-bezier(.4, 0, .2, 1)
        }

        .bar-win {
            background: linear-gradient(90deg, #00c853, #00e676)
        }

        .bar-draw {
            background: linear-gradient(90deg, #f9a825, #ffd600)
        }

        .bar-lose {
            background: linear-gradient(90deg, #c62828, #ff4545)
        }

        .prob-num {
            width: 44px;
            text-align: right;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700
        }

        /* CHIPS */
        .xg-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0
        }

        .chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px;
            font-size: 12px
        }

        .chip strong {
            color: var(--green);
            font-family: var(--mono)
        }

        .scenarios {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 12px 0
        }

        .sce {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px;
            text-align: center
        }

        .sce-score {
            font-weight: 800;
            font-size: 14px;
            font-family: var(--mono)
        }

        .sce-pct {
            color: var(--muted);
            font-size: 10px;
            margin-top: 2px
        }

        /* PLAYERS */
        .players-section {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border)
        }

        .players-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap
        }

        .players-team h4 {
            font-size: 10px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase
        }

        .player-chip {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            font-size: 11px;
            margin: 2px
        }

        .player-chip.scored {
            border-color: var(--green);
            color: var(--green)
        }

        /* FORMA */
        .forma-chip {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 9px;
            font-weight: 800;
            text-align: center;
            line-height: 20px;
            margin-right: 2px
        }

        .forma-w {
            background: #0a2a15;
            color: var(--green)
        }

        .forma-d {
            background: #2a2200;
            color: var(--yellow)
        }

        .forma-l {
            background: #2a0a0a;
            color: var(--red)
        }

        /* RESULTADOS */
        .group-header {
            font-size: 10px;
            font-weight: 800;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 22px 0 8px;
            padding-left: 2px
        }

        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 10px
        }

        .match-result {
            display: grid;
            grid-template-columns: 1fr 70px 1fr;
            align-items: center;
            gap: 10px
        }

        .team-side {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .team-side.right {
            flex-direction: row-reverse;
            justify-content: flex-start
        }

        .flag-sm {
            font-size: 24px;
            line-height: 1
        }

        .team-nm {
            font-size: 13px;
            font-weight: 700
        }

        .score-box {
            text-align: center;
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 800;
            background: var(--bg);
            border-radius: 8px;
            padding: 7px 10px;
            border: 1px solid var(--border)
        }

        .goals-section {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 24px;
            flex-wrap: wrap
        }

        .goal-list {
            font-size: 11px;
            color: var(--muted)
        }

        .goal-item {
            margin-bottom: 3px
        }

        .goal-item span {
            color: var(--text);
            font-weight: 600
        }

        /* GOLEADORES */
        .scorer-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px
        }

        .scorer-row:last-child {
            border-bottom: none
        }

        .scorer-rank {
            font-family: var(--mono);
            color: var(--muted);
            width: 20px;
            text-align: right;
            font-size: 11px
        }

        .scorer-flag {
            font-size: 18px
        }

        .scorer-name {
            flex: 1;
            font-weight: 700
        }

        .scorer-team {
            color: var(--muted);
            font-size: 11px
        }

        .scorer-goals {
            font-family: var(--mono);
            font-weight: 800;
            color: var(--green);
            font-size: 18px;
            min-width: 28px
        }

        .scorer-mins {
            font-size: 10px;
            color: var(--muted);
            font-family: var(--mono)
        }

        /* SQUAD */
        .squad-select {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center
        }

        .squad-select select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-family: var(--font);
            cursor: pointer;
            min-width: 220px
        }

        .btn-green {
            background: var(--green);
            color: #000;
            border: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font);
            transition: opacity .2s
        }

        .btn-green:hover {
            opacity: .85
        }

        .xi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            margin-top: 10px
        }

        .xi-player {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            transition: border-color .2s
        }

        .xi-player.scored-t {
            border-color: var(--green)
        }

        .xi-goals {
            color: var(--green);
            font-size: 10px;
            margin-top: 3px
        }

        /* FILTER */
        .filter-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px
        }

        .filter-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font);
            transition: all .15s
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--green);
            color: #000;
            border-color: var(--green)
        }

        /* TODOS HOY SECTION */
        .todos-hoy-btn {
            width: 100%;
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: var(--font);
            margin-bottom: 20px;
            transition: all .2s;
            letter-spacing: .3px
        }

        .todos-hoy-btn:hover {
            opacity: .9;
            transform: translateY(-1px)
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted)
        }

        .loading-spinner {
            width: 34px;
            height: 34px;
            border: 3px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 14px
        }

        /* PRED ALL CONTAINER */
        #all-hoy-preds {
            margin-top: 8px
        }

        /* RESPONSIVE */
        @media(max-width:600px) {
            .hoy-flag {
                font-size: 32px
            }

            .hoy-team-name {
                font-size: 12px
            }

            .match-result {
                grid-template-columns: 1fr 55px 1fr
            }

            .score-box {
                font-size: 16px;
                padding: 5px 7px
            }

            .flag-sm {
                font-size: 18px
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <span class="logo-ball">⚽</span>
            <div>
                <div class="logo-text">Mundial 2026</div>
                <div class="logo-sub">Predictor en vivo</div>
            </div>
        </div>
        <div id="status-badge">🔴 Cargando...</div>
    </header>

    <nav>
        <button class="active" onclick="showTab('hoy',this)">📅 Hoy</button>
        <button onclick="showTab('predicciones',this)">🎯 Predicciones</button>
        <button onclick="showTab('resultados',this)">📋 Resultados</button>
        <button onclick="showTab('goleadores',this)">🥇 Goleadores</button>
        <button onclick="showTab('squads',this)">👕 Squads</button>
        <button onclick="showTab('parejos',this)">⚡ Más Parejos</button>
    </nav>

    <main>

        <!-- HOY -->
        <div id="tab-hoy" class="section visible">
            <div class="loading" id="load-hoy">
                <div class="loading-spinner"></div>
                Cargando partidos de hoy...
            </div>
            <div id="content-hoy"></div>
        </div>

        <!-- PREDICCIONES -->
        <div id="tab-predicciones" class="section">
            <div class="filter-row" id="filter-grupos"></div>
            <div id="content-predicciones"></div>
        </div>

        <!-- RESULTADOS -->
        <div id="tab-resultados" class="section">
            <div id="content-resultados"></div>
        </div>

        <!-- GOLEADORES -->
        <div id="tab-goleadores" class="section">
            <div id="content-goleadores"></div>
        </div>

        <!-- SQUADS -->
        <div id="tab-squads" class="section">
            <div class="squad-select">
                <select id="squad-picker"></select>
                <button class="btn-green" onclick="mostrarSquad()">Ver Squad 👕</button>
            </div>
            <div id="content-squad"></div>
        </div>

        <!-- PAREJOS -->
        <div id="tab-parejos" class="section">
            <div id="content-parejos"></div>
        </div>

    </main>

    <script>
        const DATA_URL = "https://raw.githubusercontent.com/openfootball/world-cup.json/master/2026/worldcup.json";

        // Banderas emoji por nombre en español
        const FLAGS = {
            "México": "🇲🇽", "Sudáfrica": "🇿🇦", "Corea del Sur": "🇰🇷", "Rep. Checa": "🇨🇿",
            "Canadá": "🇨🇦", "Bosnia y Herz.": "🇧🇦", "Qatar": "🇶🇦", "Suiza": "🇨🇭",
            "Brasil": "🇧🇷", "Marruecos": "🇲🇦", "Haití": "🇭🇹", "Escocia": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
            "EE.UU.": "🇺🇸", "Paraguay": "🇵🇾", "Australia": "🇦🇺", "Turquía": "🇹🇷",
            "Alemania": "🇩🇪", "Curazao": "🇨🇼", "Costa de Marfil": "🇨🇮", "Ecuador": "🇪🇨",
            "Países Bajos": "🇳🇱", "Japón": "🇯🇵", "Suecia": "🇸🇪", "Túnez": "🇹🇳",
            "Bélgica": "🇧🇪", "Egipto": "🇪🇬", "Irán": "🇮🇷", "Nueva Zelanda": "🇳🇿",
            "España": "🇪🇸", "Cabo Verde": "🇨🇻", "Arabia Saudita": "🇸🇦", "Uruguay": "🇺🇾",
            "Francia": "🇫🇷", "Senegal": "🇸🇳", "Irak": "🇮🇶", "Noruega": "🇳🇴",
            "Argentina": "🇦🇷", "Argelia": "🇩🇿", "Austria": "🇦🇹", "Jordania": "🇯🇴",
            "Portugal": "🇵🇹", "Rep. D. del Congo": "🇨🇩", "Uzbekistán": "🇺🇿", "Colombia": "🇨🇴",
            "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croacia": "🇭🇷", "Ghana": "🇬🇭", "Panamá": "🇵🇦",

          <div class="hoy-team">
            <div class="hoy-flag">${flag(t2)}</div>
            <div class="hoy-team-name">${t2}</div>
            <div class="hoy-team-rank">FIFA #${d2.fifa_rank || '?'}</div>
          </div>
        </div>
        <div class="hoy-actions">
          <button class="btn-pred" onclick="togglePred('${id}','${t1}','${t2}')">🎯 Predecir este partido</button>
        </div>
        <div class="pred-inline" id="${id}"></div>
      </div>`;
                }
            } else if (!jugadosHoy.length) {
                html += `<div class="today-empty">
      <div style="font-size:40px;margin-bottom:12px">😴</div>
      <div style="font-weight:700;margin-bottom:6px">No hay partidos hoy</div>
      <div style="font-size:12px">Revisa la sección Predicciones para ver los próximos partidos</div>
    </div>`;
            }

            document.getElementById('content-hoy').innerHTML = html;
            document.getElementById('load-hoy').style.display = 'none';
        }

        function togglePred(id, t1, t2) {
            const el = document.getElementById(id);
            const btn = el.previousElementSibling.querySelector('.btn-pred');
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                btn.textContent = '🎯 Predecir este partido';
                return;
            }
            const pred = predecir(t1, t2);
            if (!pred) { el.innerHTML = '<div style="color:var(--muted);padding:12px">Sin datos para este partido</div>'; }
            else { el.innerHTML = predHtml(t1, t2, pred); }
            el.classList.add('open');
            btn.textContent = '✖ Cerrar predicción';
        }

        function predecirTodosHoy() {
            const hoy = getTodayStr();
            const partHoy = pendientes.filter(p => p.date === hoy);
            let html = '';
            for (const p of partHoy) {
                const t1 = tr(p.team1), t2 = tr(p.team2);
                const pred = predecir(t1, t2);
                if (!pred) continue;
                html += `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:28px">${flag(t1)}</span>
        <span style="font-size:15px;font-weight:700">${t1}</span>
        <span style="font-size:11px;color:var(--muted);font-weight:700;padding:4px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">VS</span>
        <span style="font-size:15px;font-weight:700">${t2}</span>
        <span style="font-size:28px">${flag(t2)}</span>
        <span style="margin-left:auto;font-size:10px;color:var(--muted)">${p.group || ''}</span>
      </div>
      ${predHtml(t1, t2, pred)}
    </div>`;
            }
            document.getElementById('all-hoy-preds').innerHTML = html || '<div class="empty">Sin partidos para predecir</div>';
            document.getElementById('all-hoy-preds').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ── PREDICCIONES ─────────────────────────────────────────
        function renderPredicciones() {
            const grupos = [...new Set(pendientes.map(p => p.group).filter(g => g))];
            document.getElementById('filter-grupos').innerHTML =
                `<button class="filter-btn active" onclick="filtrarGrupo('TODOS',this)">Todos</button>` +
                grupos.map(g => `<button class="filter-btn" onclick="filtrarGrupo('${g}',this)">${g}</button>`).join('');
            renderPredCards();
        }

        function filtrarGrupo(g, btn) {
            activeGrupo = g;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderPredCards();
        }

        function renderPredCards() {
            const filtrados = activeGrupo === 'TODOS' ? pendientes : pendientes.filter(p => p.group === activeGrupo);
            let html = '';
            for (const p of filtrados) {
                const t1 = tr(p.team1), t2 = tr(p.team2);
                if (!SELECCIONES[t1] || !SELECCIONES[t2]) continue;
                const pred = predecir(t1, t2);
                if (!pred) continue;
                const d1 = SELECCIONES[t1], d2 = SELECCIONES[t2];
                html += `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase">${p.group || ''} · ${p.date || ''}</span>
        <span class="chip" style="font-size:11px">🎯 <strong>${pred.marc}</strong></span>
      </div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:16px">
        <div style="text-align:center">
          <div style="font-size:36px">${flag(t1)}</div>
          <div style="font-size:14px;font-weight:700;margin-top:6px">${t1}</div>
          <div style="font-size:10px;color:var(--muted)">FIFA #${d1.fifa_rank}</div>
          <div style="margin-top:6px">${formaHtml(pred.f1.res)}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">VS</div>
          <div class="chip" style="font-size:11px">xG ${pred.xg1}—${pred.xg2}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:36px">${flag(t2)}</div>
          <div style="font-size:14px;font-weight:700;margin-top:6px">${t2}</div>
          <div style="font-size:10px;color:var(--muted)">FIFA #${d2.fifa_rank}</div>
          <div style="margin-top:6px">${formaHtml(pred.f2.res)}</div>
        </div>
      </div>
      <div class="prob-section">
        <div class="prob-row">
          <span class="prob-label">${flag(t1)} ${t1}</span>
          <div class="prob-bar-wrap"><div class="prob-bar bar-win" style="width:${pred.pl}%"></div></div>
          <span class="prob-num" style="color:var(--green)">${pred.pl}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label">🤝 Empate</span>
          <div class="prob-bar-wrap"><div class="prob-bar bar-draw" style="width:${pred.pe}%"></div></div>
          <span class="prob-num" style="color:var(--yellow)">${pred.pe}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label">${flag(t2)} ${t2}</span>
          <div class="prob-bar-wrap"><div class="prob-bar bar-lose" style="width:${pred.pv}%"></div></div>
          <span class="prob-num" style="color:var(--red)">${pred.pv}%</span>
        </div>
      </div>
      <div class="scenarios">${pred.esc.map(e => `<div class="sce"><div class="sce-score">${e.m}</div><div class="sce-pct">${e.p}%</div></div>`).join('')}</div>
      <div class="players-row" style="margin-top:10px">
        <div class="players-team"><h4>${flag(t1)} Goleadores ${t1}</h4>${playerChips(t1)}</div>
        <div class="players-team"><h4>${flag(t2)} Goleadores ${t2}</h4>${playerChips(t2)}</div>
      </div>
    </div>`;
            }
            document.getElementById('content-predicciones').innerHTML = html || '<div class="empty">Sin partidos para este filtro</div>';
        }

        // ── RESULTADOS ──────────────────────────────────────────
        function renderResultados() {
            let grupos = {};
            for (const p of jugados) { const g = p.group || '?'; if (!grupos[g]) grupos[g] = []; grupos[g].push(p); }
            let html = '';
            for (const [g, ps] of Object.entries(grupos)) {
                html += `<div class="group-header">${g}</div>`;
                for (const p of ps) {
                    const t1 = tr(p.team1), t2 = tr(p.team2), s = p.score.ft, ht = p.score.ht || ['-', '-'];
                    const color = s[0] > s[1] ? 'var(--green)' : s[0] === s[1] ? 'var(--yellow)' : 'var(--red)';
                    const g1 = p.goals1 || [], g2 = p.goals2 || [];
                    html += `<div class="result-card">
        <div class="match-result">
          <div class="team-side">
            <span class="flag-sm">${flag(t1)}</span>
            <span class="team-nm">${t1}</span>
          </div>
          <div class="score-box" style="color:${color}">${s[0]}-${s[1]}</div>
          <div class="team-side right">
            <span class="flag-sm">${flag(t2)}</span>
            <span class="team-nm">${t2}</span>
          </div>
        </div>
        ${(g1.length || g2.length) ? `<div class="goals-section">
          <div class="goal-list">${g1.map(g => `<div class="goal-item">⚽ <span>${g.name}</span> ${g.minute}'</div>`).join('')}</div>
          <div class="goal-list">${g2.map(g => `<div class="goal-item">⚽ <span>${g.name}</span> ${g.minute}'</div>`).join('')}</div>
        </div>`: ''}
      </div>`;
                }
            }
            document.getElementById('content-resultados').innerHTML = html || '<div class="empty">Sin resultados aún</div>';
        }

        // ── GOLEADORES ──────────────────────────────────────────
        function renderGoleadores() {
            const lista = Object.entries(goleadoresMapa).sort((a, b) => b[1].goles - a[1].goles);
            if (!lista.length) { document.getElementById('content-goleadores').innerHTML = '<div class="empty">Sin goles registrados aún</div>'; return; }
            const rows = lista.map(([n, d], i) => `
    <div class="scorer-row">
      <span class="scorer-rank">${i + 1}</span>
      <span class="scorer-flag">${flag(d.equipo)}</span>
      <span class="scorer-goals">${d.goles}</span>
      <span class="scorer-name">${n}</span>
      <span class="scorer-team">${d.equipo}</span>
      <span class="scorer-mins">${d.mins.join(', ')}'</span>
    </div>`).join('');
            document.getElementById('content-goleadores').innerHTML = `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px">${rows}</div>`;
        }

        // ── SQUADS ──────────────────────────────────────────────
        function initSquadPicker() {
            const select = document.getElementById('squad-picker');
            const equipos = Object.keys(SQUADS).sort();
            select.innerHTML = equipos.map(e => `<option value="${e}">${flag(e)} ${e}</option>`).join('');
        }
        function mostrarSquad() {
            const eq = document.getElementById('squad-picker').value;
            const sq = SQUADS[eq];
            const reales = goleadoresEq(eq);
            const golesMap = Object.fromEntries(reales.map(([n, d]) => [n, d.goles]));
            const realesN = reales.map(([n]) => n);
            const xi = sq.titulares.map(p => {
                const s = realesN.includes(p);
                return `<div class="xi-player${s ? ' scored-t' : ''}">
      ${p}${s ? `<div class="xi-goals">${golesMap[p]}⚽ en el torneo</div>` : ''}
    </div>`;
            }).join('');
            document.getElementById('content-squad').innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px">
      <div style="font-size:28px;margin-bottom:4px">${flag(eq)}</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:16px">${eq}</div>
      <div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">XI Probable</div>
      <div class="xi-grid">${xi}</div>
      ${reales.length ? `
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase">Goles en el torneo</div>
        ${reales.map(([n, d]) => `<div class="scorer-row">
          <span class="scorer-goals">${d.goles}</span>
          <span class="scorer-name">${n}</span>
          <span class="scorer-mins">${d.mins.join(', ')}'</span>
        </div>`).join('')}
      </div>`: '<div style="margin-top:16px;color:var(--muted);font-size:12px">Aún no han marcado en este torneo</div>'}
    </div>`;
        }

        // ── PAREJOS ─────────────────────────────────────────────
        function renderParejos() {
            const validos = pendientes
                .filter(p => SELECCIONES[tr(p.team1)] && SELECCIONES[tr(p.team2)])
                .map(p => ({ p, t1: tr(p.team1), t2: tr(p.team2), pred: predecir(tr(p.team1), tr(p.team2)) }))
                .filter(x => x.pred)
                .sort((a, b) => Math.abs(a.pred.pl - a.pred.pv) - Math.abs(b.pred.pl - b.pred.pv))
                .slice(0, 12);
            let html = '<div class="section-title">Los 12 partidos más reñidos estadísticamente</div>';
            for (const { p, t1, t2, pred } of validos) {
                const diff = Math.abs(pred.pl - pred.pv).toFixed(1);
                html += `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase">${p.group || ''} · ${p.date || ''}</span>
        <span style="font-size:10px;color:var(--yellow);font-weight:700">⚡ Diferencia ${diff}%</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;justify-content:center">
        <span style="font-size:30px">${flag(t1)}</span>
        <span style="font-size:14px;font-weight:700">${t1}</span>
        <span style="font-size:10px;color:var(--muted);padding:4px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">VS</span>
        <span style="font-size:14px;font-weight:700">${t2}</span>
        <span style="font-size:30px">${flag(t2)}</span>
      </div>
      <div class="prob-section">
        <div class="prob-row"><span class="prob-label">${flag(t1)} ${t1}</span><div class="prob-bar-wrap"><div class="prob-bar bar-win" style="width:${pred.pl}%"></div></div><span class="prob-num" style="color:var(--green)">${pred.pl}%</span></div>
        <div class="prob-row"><span class="prob-label">🤝 Empate</span><div class="prob-bar-wrap"><div class="prob-bar bar-draw" style="width:${pred.pe}%"></div></div><span class="prob-num" style="color:var(--yellow)">${pred.pe}%</span></div>
        <div class="prob-row"><span class="prob-label">${flag(t2)} ${t2}</span><div class="prob-bar-wrap"><div class="prob-bar bar-lose" style="width:${pred.pv}%"></div></div><span class="prob-num" style="color:var(--red)">${pred.pv}%</span></div>
      </div>
      <div class="chip" style="display:inline-block">🎯 <strong>${pred.marc}</strong></div>
    </div>`;
            }
            document.getElementById('content-parejos').innerHTML = html;
        }

        // ── TABS ────────────────────────────────────────────────
        function showTab(tab, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('visible');
            if (btn) btn.classList.add('active');
            if (tab === 'predicciones') renderPredicciones();
            if (tab === 'resultados') renderResultados();
            if (tab === 'goleadores') renderGoleadores();
            if (tab === 'squads') { initSquadPicker(); mostrarSquad(); }
            if (tab === 'parejos') renderParejos();
        }

        // ── CARGA ────────────────────────────────────────────────
        async function cargarDatos() {
            try {
                const res = await fetch(DATA_URL);
                const data = await res.json();
                const todos = data.matches || [];
                jugados = todos.filter(p => p.score && p.score.ft);
                pendientes = todos.filter(p => !p.score || !p.score.ft);
                goleadoresMapa = {};
                for (const p of jugados) {
                    for (const g of p.goals1 || []) { const n = g.name, eq = tr(p.team1); if (!goleadoresMapa[n]) goleadoresMapa[n] = { equipo: eq, goles: 0, mins: [] }; goleadoresMapa[n].goles++; goleadoresMapa[n].mins.push(g.minute || '?'); }
                    for (const g of p.goals2 || []) { const n = g.name, eq = tr(p.team2); if (!goleadoresMapa[n]) goleadoresMapa[n] = { equipo: eq, goles: 0, mins: [] }; goleadoresMapa[n].goles++; goleadoresMapa[n].mins.push(g.minute || '?'); }
                }
                document.getElementById('status-badge').textContent = `✅ ${jugados.length} jugados · ${pendientes.length} por jugar`;
                renderHoy();
            } catch (e) {
                document.getElementById('status-badge').style.cssText = 'background:#2a0f0f;color:var(--red);border-color:#5a1f1f';
                document.getElementById('status-badge').textContent = '❌ Sin conexión';
                document.getElementById('load-hoy').innerHTML = '<div class="empty">❌ Error de conexión. Verifica internet.</div>';
            }
        }

        cargarDatos();
    </script>
</body>

</html>
